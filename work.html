<body>
<header class="header">
  <div class="container nav">
    <a class="brand" href="./index.html"><img src="./assets/logo.svg" alt="Bluprint Studio logo"><span class="name">Bluprint Studio</span></a>
    <nav class="nav-links" data-menu>

      <a href="./services.html">Services</a>

      <a href="./contact.html">Contact</a>
      <div class="toggle" aria-label="Theme">
        <button data-theme="dark" class="active" aria-label="Dark">Dark</button>

<section class="section">

    <div class="section-title">
      <div><div class="kicker">Portfolio</div><h1 class="h2">Selected Work</h1></div>
      <div class="toggle"><button data-filter="all" class="active">All</button><button data-filter="brand">Brand</button><button data-filter="campaign">Campaign</button><button data-filter="packaging">Packaging</button><button data-filter="editorial">Editorial</button></div>

    <div class="gallery">
      <figure class="case" data-cat="brand"><img src="./assets/pattern.svg" alt="Brand system"><figcaption>Brand system</figcaption></figure>

      <figure class="case" data-cat="packaging"><img src="./assets/pattern.svg" alt="Packaging suite"><figcaption>Packaging suite</figcaption></figure>
      <figure class="case" data-cat="editorial"><img src="./assets/pattern.svg" alt="Editorial layout"><figcaption>Editorial layout</figcaption></figure>
      <figure class="case" data-cat="brand"><img src="./assets/pattern.svg" alt="Logo grid"><figcaption>Logo grid</figcaption></figure>
      <figure class="case" data-cat="campaign"><img src="./assets/pattern.svg" alt="Motion key visual"><figcaption>Motion key visual</figcaption></figure>

<footer class="footer">
  <div class="container grid grid-3">
    <div>
      <div class="brand"><img src="./assets/logo.svg" alt="Bluprint Studio logo" style="height:28px"><span class="name">Bluprint Studio</span></div>

      <div class="fine" style="margin-top:.4rem"><a href="./privacy.html">Privacy</a> • <a href="./terms.html">Terms</a></div>
    </div>
    <form action="https://formspree.io/f/maylzzzz" method="POST" class="grid">
      <label class="fine">Join our newsletter</label>
      <input class="input" type="email" name="email" placeholder="you@company.com" required>
      <button class="cta" type="submit">Subscribe</button>
    </form>
  </div>
</footer>
<script src="./assets/main.js" defer></script>
