<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Bluprint Graphics & Printers</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .thank-you {
      text-align: center;
      padding: 100px 20px;
      color: #003366;
    }

    .thank-you h2 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    .thank-you p {
      font-size: 1.2em;
      margin-bottom: 30px;
    }

    .back-home {
      text-decoration: none;
      background-color: #003366;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: bold;
    }

    .back-home:hover {
      background-color: #ffd700;
      color: #003366;
    }
  </style>
</head>
<body>
  <section class="thank-you">
    <h2>Thank You!</h2>
    <p>Your message has been received. We'll get back to you shortly.</p>
    <a href="index.html" class="back-home">← Back to Home</a>
  </section>

</html>
